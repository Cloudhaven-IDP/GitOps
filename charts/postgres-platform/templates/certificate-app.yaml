{{- range .Values.appRoles }}
{{- if eq (.authMode | default "cert") "cert" }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .name }}-pg-cert
  namespace: {{ .namespace | default $.Release.Namespace }}
  labels:
    {{- include "postgres-platform.labels" $ | nindent 4 }}
    postgres-platform/app: {{ .name }}
spec:
  secretName: {{ .name }}-pg-cert
  issuerRef:
    name: {{ include "postgres-platform.issuerName" $ }}
    kind: Issuer
  commonName: {{ .pgRole }}
  duration: 2160h
  renewBefore: 720h
  privateKey:
    algorithm: ECDSA
    size: 256
  usages:
    - client auth
{{- end }}
{{- end }}
