{{- if .Values.monitoring.enablePodMonitor }}
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ include "postgres-platform.clusterName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "postgres-platform.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      cnpg.io/cluster: {{ include "postgres-platform.clusterName" . }}
  podMetricsEndpoints:
    - port: metrics
      interval: 30s
{{- end }}
