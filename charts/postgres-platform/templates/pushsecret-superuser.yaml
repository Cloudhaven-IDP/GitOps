{{- if eq .Values.secretBackend.type "ssm" }}
{{- $prefix := required "secretBackend.ssm.masterPathPrefix is required when secretBackend.type=ssm" .Values.secretBackend.ssm.masterPathPrefix }}
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: {{ include "postgres-platform.clusterName" . }}-master
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "postgres-platform.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - name: {{ include "postgres-platform.secretStoreName" . }}
      kind: ClusterSecretStore
  selector:
    secret:
      name: {{ include "postgres-platform.superuserSecret" . }}
  data:
    - match:
        secretKey: username
        remoteRef:
          remoteKey: {{ $prefix }}/username
    - match:
        secretKey: password
        remoteRef:
          remoteKey: {{ $prefix }}/password
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: {{ include "postgres-platform.clusterName" . }}-ca
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "postgres-platform.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - name: {{ include "postgres-platform.secretStoreName" . }}
      kind: ClusterSecretStore
  selector:
    secret:
      name: {{ include "postgres-platform.caSecret" . }}
  data:
    - match:
        secretKey: ca.crt
        remoteRef:
          remoteKey: {{ $prefix }}/ca.crt
{{- end }}
